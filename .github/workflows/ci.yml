name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd conductor-web/frontend && bun install && bun run build
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd conductor-web/frontend && bun install && bun run build
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: Swatinem/rust-cache@v2
      - name: Build frontend
        run: cd conductor-web/frontend && bun install && bun run build
      - name: Build conductor-web binary
        run: cargo build --bin conductor-web
      - name: Install Playwright browsers
        run: cd conductor-web/frontend && bunx playwright install --with-deps chromium webkit
      - name: Run Playwright tests
        run: cd conductor-web/frontend && bun run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: conductor-web/frontend/playwright-report/
          retention-days: 7
