name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'conductor-web/frontend/**'
              - '.github/workflows/ci.yml'
            workflows:
              - '.conductor/**'

  fmt:
    name: Format
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
        if: needs.changes.outputs.rust == 'true'
      - run: cargo fmt --all --check
        if: needs.changes.outputs.rust == 'true'

  clippy:
    name: Clippy
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Tauri/GTK)
        if: needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libglib2.0-dev libssl-dev pkg-config
      - uses: oven-sh/setup-bun@v2
        if: needs.changes.outputs.rust == 'true'
      - run: cd conductor-web/frontend && bun install && bun run build
        if: needs.changes.outputs.rust == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.rust == 'true'
      - run: rustup component add clippy
        if: needs.changes.outputs.rust == 'true'
      - run: cargo clippy --workspace --all-targets -- -D warnings
        if: needs.changes.outputs.rust == 'true'

  test:
    name: Test
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Tauri/GTK)
        if: needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libglib2.0-dev libssl-dev pkg-config
      - uses: oven-sh/setup-bun@v2
        if: needs.changes.outputs.rust == 'true'
      - run: cd conductor-web/frontend && bun install && bun run build
        if: needs.changes.outputs.rust == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.rust == 'true'
      - run: cargo test -p conductor-core --features test-helpers
        if: needs.changes.outputs.rust == 'true'
      - run: cargo test --workspace --exclude conductor-core
        if: needs.changes.outputs.rust == 'true'

  validate-workflows:
    name: Validate Workflows
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.workflows == 'true'
      - name: Validate workflows
        if: needs.changes.outputs.workflows == 'true'
        run: cargo run --bin conductor -- workflow validate --all --path .

  # Playwright E2E tests run locally via the pre-push git hook (.githooks/pre-push).
  # See CLAUDE.md for setup: git config core.hooksPath .githooks
