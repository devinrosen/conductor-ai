name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd conductor-web/frontend && bun install && bun run build
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd conductor-web/frontend && bun install && bun run build
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  validate-workflows:
    name: Validate Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: filter
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^\.conductor/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: Swatinem/rust-cache@v2
        if: steps.filter.outputs.changed == 'true'
      - name: Validate workflows
        if: steps.filter.outputs.changed == 'true'
        run: cargo run --bin conductor -- workflow validate --all --path .

  # Playwright E2E tests run locally via the pre-push git hook (.githooks/pre-push).
  # See CLAUDE.md for setup: git config core.hooksPath .githooks
