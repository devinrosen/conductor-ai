<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C56C"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39B54A"/>
      <stop offset="60%" stop-color="#39B54A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#39B54A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!--
    Apple HIG: 1024x1024 canvas, ~824x824 visible area centered,
    ~100px transparent margin on each side. Rounded rect at ~180px radius
    within the 824x824 area.
  -->

  <!-- 824x824 rounded rect centered in 1024x1024 (offset 100,100) -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#0F1D36"/>

  <!-- Artwork centered in the 824x824 area -->
  <g transform="translate(512, 512) scale(1.32) translate(-256, -256)">
    <path d="M 330 115 A 175 175 0 1 0 330 397"
          fill="none" stroke="url(#brass)" stroke-width="44" stroke-linecap="round"/>
    <circle cx="370" cy="256" r="32" fill="#39B54A"/>
    <circle cx="370" cy="256" r="50" fill="url(#glow)"/>
    <circle cx="362" cy="248" r="8" fill="#FFF" opacity="0.25"/>
  </g>
</svg>
