<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C56C"/>
      <stop offset="100%" stop-color="#B8862A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39B54A"/>
      <stop offset="60%" stop-color="#39B54A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#39B54A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0F1D36"/>

  <!-- Clean bold C — single stroke, no inner channel -->
  <path d="M 330 115 A 175 175 0 1 0 330 397"
        fill="none" stroke="url(#brass)" stroke-width="44" stroke-linecap="round"/>

  <!-- Single green signal dot — larger, centered in the gap -->
  <circle cx="370" cy="256" r="32" fill="#39B54A"/>
  <circle cx="370" cy="256" r="50" fill="url(#glow)"/>
  <circle cx="362" cy="248" r="8" fill="#FFF" opacity="0.25"/>
</svg>